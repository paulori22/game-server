name: Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Unit and E2E tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        env:
          JEST_JUNIT_OUTPUT_DIR: reports
          JEST_JUNIT_OUTPUT_NAME: unit-junit.xml
        run: npm run test:ci

      - name: Run E2E tests
        env:
          JEST_JUNIT_OUTPUT_DIR: reports
          JEST_JUNIT_OUTPUT_NAME: e2e-junit.xml
        run: npm run test:e2e:ci

      - name: Publish test report
        uses: dorny/test-reporter@v2
        if: success() || failure()
        with:
          name: Jest
          path: reports/*-junit.xml
          reporter: jest-junit
          fail-on-error: true

      - name: Coverage summary
        if: success() || failure()
        run: |
          node <<'EOF'
          const fs = require('fs');
          const summaryPath = 'coverage/coverage-summary.json';
          if (!fs.existsSync(summaryPath)) {
            console.log('No coverage summary found.');
            process.exit(0);
          }
          const { total } = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
          const pct = (metric) => `${metric.pct}% (${metric.covered}/${metric.total})`;
          const body = [
            '## Coverage',
            '',
            '| Metric | Coverage |',
            '| --- | --- |',
            `| Statements | ${pct(total.statements)} |`,
            `| Branches | ${pct(total.branches)} |`,
            `| Functions | ${pct(total.functions)} |`,
            `| Lines | ${pct(total.lines)} |`,
            '',
          ].join('\n');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, body);
          EOF

      - name: Upload test and coverage artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            reports/
            coverage/
          if-no-files-found: warn
